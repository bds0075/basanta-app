<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basanta YT Official</title>
    <style>
        body { 
            margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0369a1, #0f172a);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
            color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        @keyframes gradient { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        .card { 
            background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
            padding: 40px 20px; width: 100%; max-width: 380px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .profile-img { 
            width: 130px; height: 130px; border-radius: 50%; 
            border: 4px solid #38bdf8; margin-bottom: 20px;
            object-fit: cover; box-shadow: 0 0 25px rgba(56, 189, 248, 0.5);
        }

        h1 { margin: 10px 0; font-size: 1.8rem; letter-spacing: 1px; }
        #clock { font-size: 1.4rem; color: #facc15; font-weight: bold; margin-bottom: 10px; }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .stat-box { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(56, 189, 248, 0.2); }
        .stat-box h2 { margin: 0; color: #38bdf8; font-size: 1.5rem; }

        .links { width: 100%; }
        .btn { 
            display: block; padding: 16px; margin: 12px 0; border-radius: 15px;
            text-decoration: none; color: white; font-weight: bold;
            background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.3);
            transition: all 0.3s ease;
        }
        .btn:hover { background: #38bdf8; color: #0f172a; transform: translateY(-5px); }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://i.ibb.co/mFXV3Xzj/image.jpg" class="profile-img">
        <h1>Basanta YT</h1>
        <div id="clock">00:00:00</div>
        <div class="stats">
            <div class="stat-box"><h2>5K+</h2><p>Followers</p></div>
            <div class="stat-box"><h2>Odisha</h2><p>Location</p></div>
        </div>
        <div class="links">
            <a href="https://www.facebook.com/share/1G2cez3WxV/" class="btn">Facebook</a>
            <a href="https://youtube.com/@bachanjhodia684" class="btn">YouTube</a>
        </div>
    </div>
    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
